<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal</title>
    <!-- Inter Font for that premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #475569;
            --accent-blue: #2563eb;
            --border-color: #e2e8f0;
            --gray-box-bg: #f1f5f9;
            --gray-box-border: #cbd5e1;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 700px;
            margin-top: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        /* Title: Topic Name */
        #topic-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
            color: #0f172a;
            line-height: 1.2;
            display: none;
        }

        /* Content: Information/Lecture (Gray Box) */
        #content-box {
            background: var(--gray-box-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 5px solid var(--gray-box-border);
            margin-bottom: 1.5rem;
            line-height: 1.7;
            font-style: italic;
            color: var(--text-muted);
            display: none;
        }

        /* Description: The Scenario/Case Study Text */
        #description-text {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: none;
        }

        /* Question: The Bold Question Heading above options */
        #question-text {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: none;
        }

        /* UI Elements */
        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: #fff;
            text-align: left;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-blue);
            background: #f8fafc;
        }

        .correct { background: #f0fdf4 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background: #fef2f2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        #explanation {
            margin-top: 2rem;
            padding: 1.75rem;
            background: #eff6ff;
            border-radius: 12px;
            border-left: 5px solid var(--accent-blue);
            display: none;
            line-height: 1.7;
        }

        #next-btn {
            margin-top: 1.5rem;
            background: #0f172a;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            float: right;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-container" class="card">
        <h2 style="margin-top: 0;">Start Module</h2>
        <input type="text" id="quiz-url" placeholder="Paste JSON URL...">
        <button class="btn-primary" onclick="initializeQuiz()">Load Quiz</button>
    </div>

    <div id="quiz-container" class="card hidden">
        <div id="topic-title"></div>
        <div id="content-box"></div>
        <div id="description-text"></div>
        <div id="question-text"></div>
        
        <div id="options-bin"></div>
        <div id="explanation"></div>
        
        <div style="margin-top: 20px; overflow: hidden;">
            <button id="next-btn" class="hidden" onclick="handleNextClick()">Next Question →</button>
        </div>
    </div>
</div>

<script>
    let quizData = [];
    let currentIdx = 0;
    let currentUrl = "";

    function formatGithubUrl(url) {
        if (url.includes("github.com") && url.includes("/blob/")) {
            return url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
        }
        return url;
    }

    async function initializeQuiz(providedUrl) {
        const inputUrl = providedUrl || document.getElementById('quiz-url').value.trim();
        if (!inputUrl) return;
        currentUrl = formatGithubUrl(inputUrl);
        try {
            const response = await fetch(currentUrl);
            const data = await response.json();
            quizData = Array.isArray(data) ? data : [data];
            currentIdx = 0;
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            showQuestion();
        } catch (err) { alert("Error loading quiz."); }
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        
        // Topic Title
        const titleEl = document.getElementById('topic-title');
        const titleVal = q.title || q.heading || "";
        titleEl.innerText = titleVal;
        titleEl.style.display = titleVal ? 'block' : 'none';

        // Gray Box (Information)
        const contentEl = document.getElementById('content-box');
        contentEl.innerText = q.content || "";
        contentEl.style.display = q.content ? 'block' : 'none';

        // Scenario Text (Description)
        const descEl = document.getElementById('description-text');
        descEl.innerText = q.description || "";
        descEl.style.display = q.description ? 'block' : 'none';

        // Bold Question Heading
        const questionEl = document.getElementById('question-text');
        questionEl.innerText = q.question || "";
        questionEl.style.display = q.question ? 'block' : 'none';

        const bin = document.getElementById('options-bin');
        bin.innerHTML = '';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = 'option-btn';
            btn.onclick = () => checkAnswer(btn, opt, q.answer, q.explanation);
            bin.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct, info) {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        if (selected === correct) btn.classList.add('correct');
        else {
            btn.classList.add('wrong');
            document.querySelectorAll('.option-btn').forEach(b => {
                if (b.innerText === correct) b.classList.add('correct');
            });
        }
        const expBox = document.getElementById('explanation');
        expBox.innerHTML = `<strong>Explanation</strong><p>${info}</p>`;
        expBox.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function handleNextClick() {
        currentIdx++;
        if (currentIdx < quizData.length) showQuestion();
        else offerNextModule();
    }

    async function offerNextModule() {
        const nextUrl = currentUrl.replace(/(\d+)(?=\.json)/, (m) => (parseInt(m)+1).toString().padStart(m.length, '0'));
        let nextExists = false;
        try { const res = await fetch(nextUrl, { method: 'HEAD' }); if (res.ok) nextExists = true; } catch (e) {}

        const container = document.getElementById('quiz-container');
        if (nextExists) {
            container.innerHTML = `<div style='text-align:center;'><h2>Complete!</h2><button class="btn-primary" onclick="initializeQuiz('${nextUrl}')">Next Module →</button></div>`;
        } else {
            container.innerHTML = `<div style='text-align:center;'><h2>Finished!</h2><button class="btn-primary" onclick="location.reload()">Finish</button></div>`;
        }
    }
</script>
</body>
</html>
