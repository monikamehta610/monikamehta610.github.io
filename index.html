<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Quiz Portal</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 40px; color: #1e293b; }
        #setup-container, #quiz-container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 650px; width: 100%; }
        
        #topic-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; color: #0f172a; }
        
        /* The Reading Material Box */
        #content-box { 
            background: #f1f5f9; 
            padding: 1.5rem; 
            border-radius: 8px; 
            border-left: 4px solid #cbd5e1; 
            margin-bottom: 2rem; 
            line-height: 1.6; 
            font-style: italic; 
            color: #475569;
            display: none; /* Hidden by default, shown via JS if data exists */
        }
        
        #question-text { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }
        
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 8px; }
        #start-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .option-btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; text-align: left; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #94a3b8; background: #f8fafc; }
        
        .correct { background: #f0fdf4 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fef2f2 !important; border-color: #ef4444 !important; color: #991b1b; }
        
        #explanation { margin-top: 20px; padding: 1.5rem; background: #eff6ff; border-radius: 8px; border-left: 4px solid #2563eb; display: none; }
        #next-btn { margin-top: 20px; background: #0f172a; color: white; border: none; padding: 12px 24px; border-radius: 8px; float: right; font-weight: 600; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="setup-container">
    <h2 style="margin-top:0">Quiz Loader</h2>
    <input type="text" id="quiz-url" placeholder="Paste GitHub JSON link here...">
    <button id="start-btn" onclick="initializeQuiz()">Load Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="topic-title"></div>
    <div id="content-box"></div>
    <div id="question-text"></div>
    <div id="options-bin"></div>
    <div id="explanation"></div>
    <button id="next-btn" class="hidden" onclick="nextQuestion()">Next →</button>
    <div style="clear: both;"></div>
</div>

<script>
    let quizData = [];
    let currentIdx = 0;

    function formatGithubUrl(url) {
        if (url.includes("github.com") && url.includes("/blob/")) {
            return url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
        }
        return url;
    }

    async function initializeQuiz() {
        const rawInput = document.getElementById('quiz-url').value.trim();
        const finalUrl = formatGithubUrl(rawInput);
        try {
            const response = await fetch(finalUrl);
            quizData = await response.json();
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            showQuestion();
        } catch (err) { alert("Error loading JSON. Check your URL."); }
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        
        // 1. Set Title (Question 1, Question 2, etc.)
        document.getElementById('topic-title').innerText = q.title || `Question ${currentIdx + 1}`;
        
        // 2. Set Content (The Gray Box) - Checks both 'content' or 'description' keys
        const contentBox = document.getElementById('content-box');
        const textForBox = q.content || q.description || "";
        
        if (textForBox) {
            contentBox.innerText = textForBox;
            contentBox.style.display = 'block';
        } else {
            contentBox.style.display = 'none';
        }
        
        // 3. Set Question Prompt (The bold text below the box)
        document.getElementById('question-text').innerText = q.question || "";
        
        const bin = document.getElementById('options-bin');
        bin.innerHTML = '';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = 'option-btn';
            btn.onclick = () => checkAnswer(btn, opt, q.answer, q.explanation);
            bin.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct, info) {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        if (selected === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            document.querySelectorAll('.option-btn').forEach(b => { 
                if(b.innerText === correct) b.classList.add('correct'); 
            });
        }
        const expBox = document.getElementById('explanation');
        expBox.innerHTML = `<strong>Explanation:</strong><br>${info}`;
        expBox.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            showQuestion();
        } else {
            document.getElementById('quiz-container').innerHTML = "<h2>Quiz Finished!</h2><button onclick='location.reload()'>Restart</button>";
        }
    }
</script>

</body>
</html>
