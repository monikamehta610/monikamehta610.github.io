<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 40px; color: #1e293b; }
        #setup-container, #quiz-container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 650px; width: 100%; }
        
        /* Optional Header (e.g., Question 1) */
        #header-text { font-size: 1.5rem; font-weight: 800; margin-bottom: 1.2rem; color: #0f172a; display: none; }
        
        /* The Reading Material (Content) */
        #content-box { 
            background: #f1f5f9; 
            padding: 1.5rem; 
            border-radius: 12px; 
            border-left: 5px solid #cbd5e1; 
            margin-bottom: 1.5rem; 
            line-height: 1.7; 
            font-style: italic; 
            color: #475569;
            display: none; 
        }

        /* The Scenario/Description text */
        #description-text { margin-bottom: 1.5rem; line-height: 1.6; color: #334155; display: none; }
        
        /* The Question Heading (Bold text above options) */
        #question-heading { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; color: #1e293b; display: none; }
        
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .primary-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        .option-btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; text-align: left; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #2563eb; background: #f8fafc; }
        
        .correct { background: #f0fdf4 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fef2f2 !important; border-color: #ef4444 !important; color: #991b1b; }
        
        #explanation { margin-top: 25px; padding: 1.5rem; background: #eff6ff; border-radius: 10px; border-left: 5px solid #2563eb; display: none; line-height: 1.6; }
        #next-btn { margin-top: 20px; background: #0f172a; color: white; border: none; padding: 12px 28px; border-radius: 8px; float: right; font-weight: 600; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="setup-container">
    <h2 style="margin-top:0">Quiz Loader</h2>
    <input type="text" id="quiz-url" placeholder="Paste JSON URL...">
    <button class="primary-btn" onclick="initializeQuiz()">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="header-text"></div>
    <div id="content-box"></div>
    <div id="description-text"></div>
    <div id="question-heading"></div>
    <div id="options-bin"></div>
    <div id="explanation"></div>
    <button id="next-btn" class="hidden" onclick="handleNextClick()">Next Question →</button>
    <div style="clear: both;"></div>
</div>

<script>
    let quizData = [];
    let currentIdx = 0;
    let currentUrl = "";

    function formatGithubUrl(url) {
        if (url.includes("github.com") && url.includes("/blob/")) {
            return url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
        }
        return url;
    }

    async function initializeQuiz(providedUrl) {
        const inputUrl = providedUrl || document.getElementById('quiz-url').value.trim();
        if (!inputUrl) return;
        currentUrl = formatGithubUrl(inputUrl);
        
        try {
            const response = await fetch(currentUrl);
            quizData = await response.json();
            currentIdx = 0;
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            showQuestion();
        } catch (err) { alert("Error loading quiz."); }
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        
        // 1. Header (Heading/Title)
        const header = document.getElementById('header-text');
        header.innerText = q.heading || q.title || "";
        header.style.display = (q.heading || q.title) ? 'block' : 'none';

        // 2. Content (Gray Box)
        const contentBox = document.getElementById('content-box');
        contentBox.innerText = q.content || "";
        contentBox.style.display = q.content ? 'block' : 'none';

        // 3. Description (Scenario Text)
        const descText = document.getElementById('description-text');
        descText.innerText = q.description || "";
        descText.style.display = q.description ? 'block' : 'none';

        // 4. Question (Bold Heading above options)
        const qHeading = document.getElementById('question-heading');
        qHeading.innerText = q.question || "";
        qHeading.style.display = q.question ? 'block' : 'none';
        
        const bin = document.getElementById('options-bin');
        bin.innerHTML = '';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = 'option-btn';
            btn.onclick = () => checkAnswer(btn, opt, q.answer, q.explanation);
            bin.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct, info) {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        if (selected === correct) btn.classList.add('correct');
        else {
            btn.classList.add('wrong');
            document.querySelectorAll('.option-btn').forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        const expBox = document.getElementById('explanation');
        expBox.innerHTML = `<strong>Explanation:</strong><br>${info}`;
        expBox.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function handleNextClick() {
        currentIdx++;
        if (currentIdx < quizData.length) showQuestion();
        else offerNextModule();
    }

    async function offerNextModule() {
        const nextUrl = currentUrl.replace(/(\d+)(?=\.json)/, (match) => {
            let nextNum = parseInt(match) + 1;
            return nextNum.toString().padStart(match.length, '0');
        });

        let nextExists = false;
        try {
            const res = await fetch(nextUrl, { method: 'HEAD' });
            if (res.ok) nextExists = true;
        } catch (e) {}

        let container = document.getElementById('quiz-container');
        if (nextExists) {
            container.innerHTML = `<div style='text-align:center;'><h2>Complete! 🎉</h2><button class="primary-btn" onclick="initializeQuiz('${nextUrl}')">Next Module →</button></div>`;
        } else {
            container.innerHTML = `<div style='text-align:center;'><h2>Section Finished! 🏆</h2><button class="primary-btn" onclick="location.reload()">Finish</button></div>`;
        }
    }
</script>
</body>
</html>
