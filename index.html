<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal</title>
    <!-- Inter Font for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #475569;
            --accent-blue: #2563eb;
            --border-color: #e2e8f0;
            --gray-box-bg: #f1f5f9;
            --gray-box-border: #cbd5e1;
            --success-green: #22c55e;
            --error-red: #ef4444;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 700px;
            margin-top: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
        }

        #topic-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
            color: #0f172a;
            line-height: 1.2;
        }

        #content-box {
            background: var(--gray-box-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 5px solid var(--gray-box-border);
            margin-bottom: 1.5rem;
            line-height: 1.7;
            font-style: italic;
            color: var(--text-muted);
        }

        #description-text {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        #question-text {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent-blue); }

        .btn-primary {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }

        .option-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: #fff;
            text-align: left;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-blue);
            background: #f8fafc;
        }

        .correct { background: #f0fdf4 !important; border-color: var(--success-green) !important; color: #166534 !important; }
        .wrong { background: #fef2f2 !important; border-color: var(--error-red) !important; color: #991b1b !important; }

        #explanation {
            margin-top: 2rem;
            padding: 1.75rem;
            background: #eff6ff;
            border-radius: 12px;
            border-left: 5px solid var(--accent-blue);
            display: none;
            line-height: 1.7;
        }

        #next-btn {
            margin-top: 1.5rem;
            background: #0f172a;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            float: right;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden { display: none !important; }

        /* Error Message Box */
        #error-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            z-index: 10;
            border-radius: 16px;
        }
        .error-title { color: var(--error-red); font-weight: 800; margin-bottom: 10px; }
        .error-body { color: var(--text-muted); margin-bottom: 20px; }

        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }

        #completion-screen {
            text-align: center;
        }
    </style>
</head>
<body>

<div id="app-container">
    <!-- Setup Screen -->
    <div id="setup-container" class="card">
        <h2 style="margin-top: 0;">Start Module</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Enter the JSON URL for your quiz module (e.g., .../001.json)</p>
        <input type="text" id="quiz-url" placeholder="https://.../quiz_001.json">
        <button class="btn-primary" onclick="initializeQuiz()">Load Quiz</button>
    </div>

    <!-- Quiz Content -->
    <div id="quiz-container" class="card hidden">
        <div id="error-overlay" class="hidden">
            <h3 class="error-title">Error Loading Quiz</h3>
            <p id="error-message" class="error-body"></p>
            <button class="btn-primary" style="max-width: 200px;" onclick="location.reload()">Try Again</button>
        </div>

        <div id="quiz-flow">
            <div id="topic-title"></div>
            <div id="content-box"></div>
            <div id="description-text"></div>
            <div id="question-text"></div>
            
            <div id="options-bin"></div>
            <div id="explanation"></div>
            
            <div style="margin-top: 20px; overflow: hidden;">
                <button id="next-btn" class="hidden" onclick="handleNextClick()">Next Question →</button>
            </div>
        </div>

        <!-- Completion/Transition Screen -->
        <div id="completion-screen" class="hidden">
            <h2 id="completion-title">Module Complete!</h2>
            <p id="completion-msg" style="color: var(--text-muted); margin-bottom: 24px;">Great job finishing this section.</p>
            <div id="transition-actions">
                <!-- Dynamic buttons added here -->
            </div>
        </div>
    </div>
</div>

<script>
    let quizData = [];
    let currentIdx = 0;
    let currentUrl = "";

    function formatGithubUrl(url) {
        if (url.includes("github.com") && url.includes("/blob/")) {
            return url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
        }
        return url;
    }

    function showError(msg) {
        const errorOverlay = document.getElementById('error-overlay');
        const errorMessage = document.getElementById('error-message');
        errorMessage.innerText = msg;
        errorOverlay.classList.remove('hidden');
    }

    async function initializeQuiz(providedUrl) {
        const inputUrl = providedUrl || document.getElementById('quiz-url').value.trim();
        if (!inputUrl) return;

        currentUrl = formatGithubUrl(inputUrl);
        
        // UI Reset
        const setupContainer = document.getElementById('setup-container');
        const quizContainer = document.getElementById('quiz-container');
        const quizFlow = document.getElementById('quiz-flow');
        const completionScreen = document.getElementById('completion-screen');
        const errorOverlay = document.getElementById('error-overlay');

        setupContainer.classList.add('hidden');
        quizContainer.classList.remove('hidden');
        quizFlow.classList.add('hidden');
        completionScreen.classList.add('hidden');
        errorOverlay.classList.add('hidden');

        try {
            const response = await fetch(currentUrl);
            if (!response.ok) {
                if (response.status === 404) throw new Error("The quiz file was not found (404). Check the URL.");
                throw new Error(`Failed to fetch (${response.status})`);
            }
            
            const data = await response.json();
            quizData = Array.isArray(data) ? data : [data];
            
            if (quizData.length === 0) throw new Error("Quiz file is empty.");
            
            currentIdx = 0;
            quizFlow.classList.remove('hidden');
            showQuestion();
        } catch (err) { 
            console.error(err);
            showError(err.message);
        }
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        if (!q) return;

        // Topic Title
        const titleEl = document.getElementById('topic-title');
        const titleVal = q.title || q.heading || "";
        titleEl.innerText = titleVal;
        titleEl.style.display = titleVal ? 'block' : 'none';

        // Gray Box (Information)
        const contentEl = document.getElementById('content-box');
        contentEl.innerText = q.content || "";
        contentEl.style.display = q.content ? 'block' : 'none';

        // Scenario Text (Description)
        const descEl = document.getElementById('description-text');
        descEl.innerText = q.description || "";
        descEl.style.display = q.description ? 'block' : 'none';

        // Bold Question Heading
        const questionEl = document.getElementById('question-text');
        questionEl.innerText = q.question || "";
        questionEl.style.display = q.question ? 'block' : 'none';

        const bin = document.getElementById('options-bin');
        bin.innerHTML = '';
        
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');

        if (q.options && Array.isArray(q.options)) {
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = 'option-btn';
                btn.onclick = () => checkAnswer(btn, opt, q.answer, q.explanation);
                bin.appendChild(btn);
            });
        }
    }

    function checkAnswer(btn, selected, correct, info) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);
        
        if (selected === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if (b.innerText === correct) b.classList.add('correct');
            });
        }

        const expBox = document.getElementById('explanation');
        expBox.innerHTML = `<strong>Explanation</strong><p>${info || "No explanation provided."}</p>`;
        expBox.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function handleNextClick() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            showQuestion();
        } else {
            offerNextModule();
        }
    }

    async function offerNextModule() {
        // Find the number in the filename and increment it
        const nextUrl = currentUrl.replace(/(\d+)(?=\.json)/, (m) => {
            const nextNum = parseInt(m) + 1;
            return nextNum.toString().padStart(m.length, '0');
        });

        document.getElementById('quiz-flow').classList.add('hidden');
        const screen = document.getElementById('completion-screen');
        const actionBox = document.getElementById('transition-actions');
        screen.classList.remove('hidden');
        actionBox.innerHTML = '<p class="loading-spinner">Checking for next module...</p>';

        let nextExists = false;
        try { 
            const res = await fetch(nextUrl); 
            if (res.ok) nextExists = true; 
        } catch (e) {
            console.log("Next module not found or network error.");
        }

        if (nextExists) {
            actionBox.innerHTML = `
                <button class="btn-primary" onclick="initializeQuiz('${nextUrl}')">
                    Start Next Module →
                </button>
            `;
        } else {
            document.getElementById('completion-title').innerText = "All Modules Finished!";
            document.getElementById('completion-msg').innerText = "You have completed the entire series.";
            actionBox.innerHTML = `
                <button class="btn-primary" onclick="location.reload()">
                    Return to Start
                </button>
            `;
        }
    }
</script>
</body>
</html>
