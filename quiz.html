<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        #quiz-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .option-btn { display: block; width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: #fff; transition: 0.3s; }
        .option-btn:hover { background: #eef2ff; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
        #explanation { margin-top: 20px; padding: 15px; background: #f0f7ff; border-left: 5px solid #3b82f6; display: none; }
        #next-btn { margin-top: 20px; background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <h2 id="question">Loading quiz...</h2>
    <div id="options-bin"></div>
    <div id="explanation"></div>
    <button id="next-btn" onclick="nextQuestion()">Next Question</button>
</div>

<script>
    let quizData = [];
    let currentIdx = 0;

    // 1. Fetch the data from your JSON file
    async function loadQuiz() {
        try {
            const response = await fetch('quiz.json'); // Ensure this matches your filename
            quizData = await response.json();
            showQuestion();
        } catch (error) {
            document.getElementById('question').innerText = "Error loading quiz data.";
        }
    }

    // 2. Display the current question
    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question').innerText = q.question;
        const bin = document.getElementById('options-bin');
        bin.innerHTML = '';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = 'option-btn';
            btn.onclick = () => checkAnswer(btn, opt, q.answer, q.explanation);
            bin.appendChild(btn);
        });
    }

    // 3. Logic for Right/Wrong
    function checkAnswer(btn, selected, correct, info) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true); // Disable further clicking

        if (selected === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            // Highlight the correct one anyway
            buttons.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        const expBox = document.getElementById('explanation');
        expBox.innerHTML = `<strong>Explanation:</strong> ${info}`;
        expBox.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            showQuestion();
        } else {
            document.getElementById('quiz-container').innerHTML = "<h2>Quiz Finished!</h2><p>Refresh to try again.</p>";
        }
    }

    loadQuiz();
</script>

</body>
</html>
